name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Typecheck + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests + coverage (vitest)
        run: npm run test:coverage
